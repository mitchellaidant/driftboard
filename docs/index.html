<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Driftboard</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand"><img class="logo-mark" src="favicon.svg" alt="" width="22" height="22" /> Driftboard</div>
    <nav class="workspaces" id="workspaces"></nav>
    <button class="ws-add" id="ws-add" title="New board">+</button>
    <div class="header-spacer"></div>
    <div class="demo-banner" id="demo-banner" title="This is a browser-only demo — your board lives in this browser's storage">
      <span class="demo-flask">🧪</span>
      <span class="demo-text">Demo — saved in your browser</span>
      <button class="btn-ghost" id="demo-reset">Reset</button>
    </div>
    <div class="save-status" id="save-status" title="Save status">
      <span class="save-spinner"></span>
      <span class="save-check">✓</span>
      <span class="save-text">Saved</span>
    </div>
    <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle light / dark"></button>
  </header>

  <main class="stage">
    <div class="canvas-viewport" id="viewport">
      <div class="canvas-world" id="world"></div>
    </div>

    <div class="toolbar">
      <button class="tool-btn" id="add-card-btn" title="Add a card">
        <svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 9v6M9 12h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Card</span>
      </button>
      <button class="tool-btn" id="add-binder-btn" title="Add a binder">
        <svg viewBox="0 0 24 24"><path d="M4 6h6l2 2h8v10H4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
        <span>Binder</span>
      </button>
      <div class="tool-divider"></div>
      <button class="tool-btn" id="snap-toggle" title="Snap to grid">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z M4 9h16 M4 14h16 M9 4v16 M14 4v16" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
        <span>Snap</span>
      </button>
      <div class="tool-divider"></div>
      <button class="tool-btn icon-only" id="zoom-out" title="Zoom out">−</button>
      <button class="tool-btn zoom-label" id="zoom-reset" title="Reset view">100%</button>
      <button class="tool-btn icon-only" id="zoom-in" title="Zoom in">+</button>
    </div>

    <div class="canvas-hint" id="canvas-hint">Scroll to pan · ⌘/Ctrl + scroll to zoom · drag empty space to move around</div>
  </main>

  <!-- Card detail modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-tools">
        <button class="icon-btn danger" id="delete-card" title="Delete card" aria-label="Delete card"></button>
        <button class="icon-btn" id="modal-close" title="Close (Esc)" aria-label="Close"></button>
      </div>

      <input id="card-title" class="card-title-input" placeholder="Card title" />
      <div class="card-meta" id="card-meta"></div>

      <section class="modal-section">
        <div class="section-head">
          <h3>Description</h3>
          <button class="btn-ghost" id="desc-toggle">Edit</button>
        </div>
        <div id="desc-view" class="markdown"></div>
        <textarea id="desc-edit" class="text-area hidden" placeholder="Description (markdown supported)…"></textarea>
      </section>

      <section class="modal-section">
        <div class="section-head">
          <h3>Attachments</h3>
          <button class="btn-ghost" id="att-sort" title="Toggle sort order">Newest first ↓</button>
        </div>

        <button class="add-drop" id="add-drop">
          <span class="add-drop-plus">+</span>
          <span class="add-drop-sub">Click to add a text note · drag a file here or paste to upload</span>
        </button>
        <input type="file" id="file-input" multiple class="hidden" />

        <div id="attachments" class="attachments"></div>
      </section>
    </div>
  </div>

  <!-- Binder editor modal -->
  <div id="binder-overlay" class="modal-overlay hidden">
    <div class="modal binder-modal" id="binder-modal" role="dialog" aria-modal="true">
      <div class="binder-color-bar" id="binder-color-bar" title="Click to change colour"></div>
      <div class="modal-tools">
        <button class="icon-btn" id="binder-edit-color" title="Change colour" aria-label="Change colour"></button>
        <button class="icon-btn danger" id="binder-delete" title="Delete binder" aria-label="Delete binder"></button>
        <button class="icon-btn" id="binder-close" title="Close (Esc)" aria-label="Close"></button>
      </div>
      <input id="binder-name" class="card-title-input" placeholder="Binder name" />
      <section class="modal-section">
        <div class="section-head"><h3>Description</h3></div>
        <textarea id="binder-desc" class="text-area" placeholder="What's this binder for?"></textarea>
      </section>
    </div>
  </div>

  <script src="vendor/marked.js"></script>
  <script src="vendor/purify.js"></script>
  <script src="config.js"></script>
  <script src="demo-api.js"></script>
  <script src="app.js"></script>
</body>
</html>
